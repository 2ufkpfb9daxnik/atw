<!doctype html>
<html lang="ja">
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<title>atw</title>
	<style>
		:root {
			--bg: #f7f7f7;
			--card: #ffffff;
			--text: #202124;
			--muted: #5f6368;
			--line: #e2e2e2;
			--link: #0b57d0;
		}

		* { box-sizing: border-box; }

		body {
			margin: 0;
			background: var(--bg);
			color: var(--text);
			font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
			line-height: 1.6;
		}

		main {
			max-width: 760px;
			margin: 36px auto;
			padding: 0 16px;
		}

		.card {
			background: var(--card);
			border: 1px solid var(--line);
			border-radius: 10px;
			padding: 20px;
		}

		h1 {
			margin: 0 0 8px;
			font-size: 1.5rem;
		}

		p {
			margin: 0 0 12px;
			color: var(--muted);
		}

		ul {
			margin: 0 0 16px;
			padding-left: 18px;
		}

		a {
			color: var(--link);
			text-decoration: none;
		}

		a:hover {
			text-decoration: underline;
		}

		.small {
			margin-top: 14px;
			font-size: 0.92rem;
			color: var(--muted);
		}

		.video {
			margin-top: 14px;
		}

		.video-frame {
			position: relative;
			width: 100%;
			padding-top: 56.25%;
			border: 1px solid var(--line);
			border-radius: 8px;
			overflow: hidden;
			background: #000;
		}

		.video-frame iframe {
			position: absolute;
			inset: 0;
			width: 100%;
			height: 100%;
			border: 0;
		}
	</style>
</head>
<body>
	<main>
		<section class="card">
			<h1>atw</h1>
			<p>
				タイプウェルや<a href="https://o24.works/atc/" target="_blank" rel="noopener noreferrer">ATC Tester</a>に影響されたタイピングソフトです。個人的なgodotの習作でもあります。
			</p>

			<ul>
				<li>お題を順次入力して計測</li>
				<li>自作の順次打鍵配列・自作お題・背景を切り替え可能</li>
				<li>記録一覧、詳細リプレイ、評価表示</li>
				<li>任意の順次打鍵配列のキーガイド表示に対応</li>

			<div class="video">
				<div class="video-frame">
					<iframe
						src="https://www.youtube.com/embed/2IKZLVlPjQg"
						title="ATW demo video"
						allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
						allowfullscreen>
					</iframe>
				</div>
			</div>
			</ul>

			<p>
				リポジトリからダウンロード
				<a href="https://github.com/2ufkpfb9daxnik/atw" target="_blank" rel="noopener noreferrer">
					github.com/2ufkpfb9daxnik/atw
				</a>
			</p>
		</section>
	</main>
</body>
</html>
